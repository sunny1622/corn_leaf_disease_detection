<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Security Update | Corn Network</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    :root {
      --primary: #8bc34a;
      --secondary: #689f38;
      --accent: #ffc107;
      --dark: #2e7d32;
      --darker: #1b5e20;
      --light: #f1f8e9;
      --danger: #e74c3c;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--light);
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: 
        radial-gradient(circle at 25% 25%, rgba(139, 195, 74, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(104, 159, 56, 0.1) 0%, transparent 50%);
      overflow-x: hidden;
    }
    
    .container {
      width: 100%;
      max-width: 500px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    
    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(139, 195, 74, 0.3);
      position: relative;
      overflow: hidden;
    }
    
    .login-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        to bottom right,
        transparent 45%,
        rgba(139, 195, 74, 0.1) 48%,
        transparent 52%
      );
      animation: rotate 8s linear infinite;
      z-index: -1;
    }
    
    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .corn-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(139, 195, 74, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 195, 74, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -1;
    }
    
    h1 {
      font-family: 'Poppins', sans-serif;
      color: var(--dark);
      margin-bottom: 1.5rem;
      text-align: center;
      font-weight: 700;
      letter-spacing: 1px;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--darker);
      font-size: 0.9rem;
    }
    
    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(139, 195, 74, 0.3);
      border-radius: 5px;
      color: #333;
      font-family: 'Roboto', sans-serif;
      transition: all 0.3s ease;
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 0 2px rgba(139, 195, 74, 0.2);
    }
    
    .btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 5px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
      margin-top: 1rem;
      position: relative;
      overflow: hidden;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(104, 159, 56, 0.4);
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }
    
    .btn:hover::before {
      left: 100%;
    }
    
    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #555;
      font-size: 0.9rem;
    }
    
    .register-link a {
      color: var(--dark);
      text-decoration: none;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    .register-link a:hover {
      text-decoration: underline;
      color: var(--darker);
    }
    
    .flashes {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }
    
    .flash-message {
      padding: 1rem 1.5rem;
      margin-bottom: 1rem;
      border-radius: 5px;
      color: white;
      animation: slideInRight 0.5s forwards, fadeOut 0.5s 4.5s forwards;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
    }
    
    .flash-message::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      animation: progressBar 5s linear forwards;
    }
    
    @keyframes progressBar {
      0% { width: 100%; }
      100% { width: 0%; }
    }
    
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes fadeOut {
      to { opacity: 0; }
    }
    
    .danger {
      background: linear-gradient(135deg, #d32f2f, #b71c1c);
    }
    
    .warning {
      background: linear-gradient(135deg, #ffa000, #f57f17);
    }
    
    .success {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }
    
    .corn-leaf {
      position: absolute;
      width: 40px;
      height: 40px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%238bc34a"><path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3C19 20 22 3 22 3c-1 2-8 2.25-13 3.25S2 11.5 2 13.5c0 1.78 2 4.25 4 4.25 1.22 0 3.18-1.44 3.45-2.25.23-.7.55-2.3.55-3.5 0-1.65 1.96-3.5 5-4zm-1 2c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3z"/></svg>') no-repeat center;
      animation: float 6s infinite ease-in-out;
      opacity: 0.7;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
      50% { transform: translateY(-20px) translateX(10px) rotate(5deg); }
    }
    
    .leaf-1 {
      top: 10%;
      left: 15%;
      animation-delay: 0s;
    }
    
    .leaf-2 {
      top: 70%;
      left: 80%;
      animation-delay: 1s;
    }
    
    .leaf-3 {
      top: 30%;
      left: 85%;
      animation-delay: 2s;
    }
    
    .leaf-4 {
      top: 85%;
      left: 20%;
      animation-delay: 3s;
    }
    
    .password-container {
      position: relative;
    }
    
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--darker);
      transition: all 0.3s ease;
    }
    
    .toggle-password:hover {
      color: var(--dark);
    }
    
    .alert-badge {
      display: inline-block;
      background-color: var(--danger);
      color: white;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-left: 5px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }
      
      .login-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Floating corn leaves -->
  <div class="corn-leaf leaf-1"></div>
  <div class="corn-leaf leaf-2"></div>
  <div class="corn-leaf leaf-3"></div>
  <div class="corn-leaf leaf-4"></div>
  
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flashes">
        {% for category, message in messages %}
          <div class="flash-message {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="container animate__animated animate__fadeIn">
    <form method="POST" class="login-card">
      <div class="corn-grid"></div>
      <h1 class="animate__animated animate__fadeInDown">Security Update <span class="alert-badge">IMPORTANT</span></h1>
      
      <div class="form-group animate__animated animate__fadeIn animate__delay-1s">
        <label for="current_password">Current Password</label>
        <div class="password-container">
          <input type="password" class="form-control" id="current_password" name="current_password" required placeholder="Enter current password">
          <span class="toggle-password" onclick="togglePasswordVisibility(this)">
            <i class="fas fa-eye"></i>
          </span>
        </div>
      </div>
      
      <div class="form-group animate__animated animate__fadeIn animate__delay-2s">
        <label for="new_password">New Password</label>
        <div class="password-container">
          <input type="password" class="form-control" id="new_password" name="new_password" required placeholder="Enter new password">
          <span class="toggle-password" onclick="togglePasswordVisibility(this)">
            <i class="fas fa-eye"></i>
          </span>
        </div>
      </div>
      
      <div class="form-group animate__animated animate__fadeIn animate__delay-3s">
        <label for="confirm_password">Confirm Password</label>
        <div class="password-container">
          <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="Confirm new password">
          <span class="toggle-password" onclick="togglePasswordVisibility(this)">
            <i class="fas fa-eye"></i>
          </span>
        </div>
      </div>
      
      <button type="submit" class="btn animate__animated animate__pulse animate__delay-4s">
        <i class="fas fa-lock"></i> Update Password
      </button>
      
      <div class="register-link animate__animated animate__fadeIn animate__delay-5s">
        <a href="{{ url_for('auth.login') }}">Back to Login</a>
      </div>
    </form>
  </div>

  <script>
    // Toggle password visibility
    function togglePasswordVisibility(element) {
      const container = element.closest('.password-container');
      const input = container.querySelector('input');
      const icon = container.querySelector('i');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    // Auto-dismiss flash messages
    setTimeout(() => {
      const messages = document.querySelectorAll('.flash-message');
      messages.forEach(msg => {
        msg.style.transition = 'opacity 0.5s ease';
        msg.style.opacity = '0';
        setTimeout(() => msg.remove(), 500);
      });
    }, 4000);
  </script>
</body>
</html>
