<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Recovery | Corn Disease Detection</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8bc34a;
      --secondary: #689f38;
      --accent: #ffc107;
      --dark: #2e7d32;
      --darker: #1b5e20;
      --light: #f1f8e9;
      --success: #27ae60;
      --danger: #e74c3c;
      --warning: #f39c12;
      --info: #3498db;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--light);
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: 
        radial-gradient(circle at 25% 25%, rgba(139, 195, 74, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(104, 159, 56, 0.1) 0%, transparent 50%);
    }

    /* Corn leaf grid background */
    .corn-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(139, 195, 74, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 195, 74, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -1;
      pointer-events: none;
    }

    /* Floating corn leaves */
    .corn-leaf {
      position: fixed;
      width: 40px;
      height: 40px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%238bc34a"><path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66.95-2.3c.48.17.98.3 1.34.3C19 20 22 3 22 3c-1 2-8 2.25-13 3.25S2 11.5 2 13.5c0 1.78 2 4.25 4 4.25 1.22 0 3.18-1.44 3.45-2.25.23-.7.55-2.3.55-3.5 0-1.65 1.96-3.5 5-4zm-1 2c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3z"/></svg>') no-repeat center;
      animation: float 4s infinite ease-in-out;
      opacity: 0.7;
      z-index: -1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
      50% { transform: translateY(-15px) translateX(8px) rotate(5deg); }
    }

    .leaf-1 { top: 10%; left: 15%; }
    .leaf-2 { top: 70%; left: 80%; animation-delay: 0.5s; }
    .leaf-3 { top: 30%; left: 85%; animation-delay: 1s; }
    .leaf-4 { top: 85%; left: 20%; animation-delay: 1.5s; }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 2rem;
    }

    .recovery-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(139, 195, 74, 0.3);
      transition: all 0.2s ease;
    }

    .recovery-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }

    .recovery-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .logo {
      text-align: center;
      margin-bottom: 1rem;
    }

    .logo i {
      font-size: 50px;
      color: var(--dark);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    h2 {
      font-family: 'Poppins', sans-serif;
      color: var(--dark);
      margin-bottom: 1.5rem;
      text-align: center;
      font-weight: 700;
      letter-spacing: 1px;
    }

    h2::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      margin: 10px auto;
      transition: width 0.2s ease;
    }

    h2:hover::after {
      width: 100px;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--darker);
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 0.8rem;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(139, 195, 74, 0.3);
      border-radius: 6px;
      color: #333;
      transition: all 0.2s ease;
    }

    input::placeholder {
      color: #666;
      opacity: 0.6;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(139, 195, 74, 0.2);
      outline: none;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 6px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 1rem;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(104, 159, 56, 0.3);
    }

    .security-note {
      font-size: 12px;
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(139, 195, 74, 0.2);
      color: #555;
    }

    .alert-badge {
      display: inline-block;
      background-color: var(--accent);
      color: var(--darker);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      margin-left: 5px;
      animation: pulse 1.5s infinite;
    }

    /* Flash messages */
    .flash-messages {
      position: fixed;
      top: 20px;
      right: 20px;
      max-width: 300px;
    }
    
    .flash-message {
      padding: 10px 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      color: white;
      font-size: 14px;
      animation: slideIn 0.3s ease forwards, fadeOut 0.3s ease 2.7s forwards;
      font-family: 'Poppins', sans-serif;
    }
    
    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes fadeOut {
      to { opacity: 0; }
    }
    
    .flash-message.success { background: rgba(39, 174, 96, 0.9); }
    .flash-message.error { background: rgba(231, 76, 60, 0.9); }
    .flash-message.warning { background: rgba(243, 156, 18, 0.9); }
    .flash-message.info { background: rgba(52, 152, 219, 0.9); }
  </style>
</head>
<body>
  <!-- Corn leaf background elements -->
  <div class="corn-grid"></div>
  <div class="corn-leaf leaf-1"></div>
  <div class="corn-leaf leaf-2"></div>
  <div class="corn-leaf leaf-3"></div>
  <div class="corn-leaf leaf-4"></div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
          <div class="flash-message {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="container">
    <form method="POST" class="recovery-card">
      <div class="logo">
        <i class="fas fa-key"></i>
      </div>
      
      <h2>Password Recovery <span class="alert-badge">SECURE</span></h2>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="your.email@example.com">
      </div>

      <button type="submit">
        <i class="fas fa-shield-alt"></i> Request Reset Link
      </button>

      <p class="security-note">
        <i class="fas fa-lock"></i> We'll send a secure password reset link to your email
      </p>
    </form>
  </div>

  <script>
    setTimeout(() => {
      const messages = document.querySelectorAll('.flash-message');
      messages.forEach(msg => {
        msg.style.transition = 'opacity 0.3s ease';
        msg.style.opacity = '0';
        setTimeout(() => msg.remove(), 300);
      });
    }, 3000);
  </script>
</body>
</html>
